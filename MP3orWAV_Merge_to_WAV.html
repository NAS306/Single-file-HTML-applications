<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>오디오 이어붙이기 (개선판)</title>
<style>
  body{background:#0f172a;color:#e5e7eb;font-family:sans-serif;margin:0;padding:20px;}
  .card{background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;max-width:900px;margin:auto;}
  .head{padding:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;border-bottom:1px solid rgba(255,255,255,.1);}
  input[type=file]{display:none;}
  .btn{padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#1f2937;color:#fff;cursor:pointer;}
  .btn.primary{background:#2563eb;border:none;}
  .btn.small{padding:4px 8px;font-size:12px;}
  .btn.danger{background:#7f1d1d;border:none;}
  .list{padding:10px;}
  .item{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:6px;background:#1e293b;border-radius:8px;cursor:grab;}
  .item.dragging{opacity:0.4;}
  .drag-placeholder{height:40px;background:rgba(96,165,250,.2);border:2px dashed #60a5fa;margin:4px 0;border-radius:6px;}
  .name{flex:1;}
  .controls{display:flex;gap:6px;}
  .foot{padding:12px;display:flex;gap:10px;align-items:center;border-top:1px solid rgba(255,255,255,.1);}
  progress{width:200px;height:14px;}
  .grow{flex:1;}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <label class="btn" for="fileInput">파일 선택</label>
    <input id="fileInput" type="file" accept=".mp3,.wav,audio/*" multiple>
    <input id="outputName" type="text" placeholder="출력 파일명 (확장자 제외)" style="flex:1;min-width:150px;padding:6px;border-radius:6px;border:1px solid #333;background:#0f172a;color:#fff;">
    <button class="btn primary" id="mergeBtn">합치기 & 다운로드</button>
    <button class="btn danger" id="clearBtn">비우기</button>
  </div>
  <div class="list" id="list"></div>
  <div class="foot">
    <span id="status">준비 완료</span>
    <div class="grow"></div>
    <progress id="progress" value="0" max="1"></progress>
  </div>
</div>

<script>
const fileInput=document.getElementById('fileInput');
const listEl=document.getElementById('list');
const mergeBtn=document.getElementById('mergeBtn');
const clearBtn=document.getElementById('clearBtn');
const statusEl=document.getElementById('status');
const progressEl=document.getElementById('progress');
const outputName=document.getElementById('outputName');

let items=[]; // {id,file,name,buffer?,duration?}
let ctx;

function setStatus(t){statusEl.textContent=t;}

function render(){
  listEl.innerHTML='';
  items.forEach(it=>{
    const row=document.createElement('div');
    row.className='item';
    row.draggable=true;
    row.dataset.id=it.id;
    row.innerHTML=`<div class="name">${it.name}</div>
      <div class="controls">
        <button class="btn small danger">삭제</button>
      </div>`;
    row.querySelector('.btn').onclick=()=>{items=items.filter(x=>x.id!==it.id);render();};
    listEl.appendChild(row);
  });
  enableDragSort();
}

fileInput.onchange=e=>{
  for(const f of e.target.files){
    items.push({id:crypto.randomUUID(),file:f,name:f.name});
  }
  render();
  decodeAll();
};
clearBtn.onclick=()=>{items=[];render();setStatus('목록 비움');};

async function getCtx(){
  if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
  return ctx;
}
async function decodeAll(){
  const context=await getCtx();
  for(const it of items){
    if(!it.buffer){
      const arr=await it.file.arrayBuffer();
      try{
        it.buffer=await context.decodeAudioData(arr.slice(0));
        it.duration=it.buffer.duration;
      }catch(e){setStatus('디코딩 실패: '+it.name);}
    }
  }
}

mergeBtn.onclick=async()=>{
  if(!items.length){setStatus('파일을 추가하세요');return;}
  await decodeAll();
  const valid=items.filter(i=>i.buffer);
  if(!valid.length){setStatus('유효한 파일 없음');return;}

  const sampleRate=(ctx?ctx.sampleRate:44100);
  const channels=Math.max(...valid.map(i=>i.buffer.numberOfChannels),2);
  const totalLen=valid.reduce((a,b)=>a+b.buffer.length,0);
  const outBuf=new Float32Array(totalLen*channels);
  
  // 진행도
  let offset=0;
  progressEl.value=0;
  for(const it of valid){
    for(let c=0;c<channels;c++){
      const data=it.buffer.getChannelData(Math.min(c,it.buffer.numberOfChannels-1));
      for(let i=0;i<data.length;i++){
        outBuf[(offset+i)*channels+c]=data[i];
      }
    }
    offset+=it.buffer.length;
    progressEl.value=offset/totalLen;
    await new Promise(r=>setTimeout(r)); // UI 갱신 기회
  }

  // WAV 생성
  const length=outBuf.length/channels;
  const audioBuf=(ctx||await getCtx()).createBuffer(channels,length,sampleRate);
  for(let c=0;c<channels;c++){
    const chData=audioBuf.getChannelData(c);
    for(let i=0;i<length;i++) chData[i]=outBuf[i*channels+c];
  }
  const blob=audioBufferToWav(audioBuf);
  const name=(outputName.value.trim()||'merged')+'.wav';
  downloadBlob(blob,name);
  setStatus('완료: '+name);
  progressEl.value=1;
};

function audioBufferToWav(buffer){
  const numCh=buffer.numberOfChannels, len=buffer.length, rate=buffer.sampleRate;
  const blockAlign=numCh*2, dataSize=len*blockAlign;
  const buf=new ArrayBuffer(44+dataSize);const view=new DataView(buf);
  const write=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};
  write(0,'RIFF');view.setUint32(4,36+dataSize,true);write(8,'WAVE');
  write(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);
  view.setUint16(22,numCh,true);view.setUint32(24,rate,true);
  view.setUint32(28,rate*blockAlign,true);view.setUint16(32,blockAlign,true);view.setUint16(34,16,true);
  write(36,'data');view.setUint32(40,dataSize,true);
  let pos=44;
  for(let i=0;i<len;i++){
    for(let c=0;c<numCh;c++){
      let s=Math.max(-1,Math.min(1,buffer.getChannelData(c)[i]));
      view.setInt16(pos,s<0?s*0x8000:s*0x7FFF,true);pos+=2;
    }
  }
  return new Blob([view],{type:'audio/wav'});
}
function downloadBlob(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

// --- 드래그 앤 드롭 정렬 ---
function enableDragSort(){
  const rows=[...listEl.querySelectorAll('.item')];
  let dragEl, placeholder;
  rows.forEach(r=>{
    r.addEventListener('dragstart',e=>{
      dragEl=r; r.classList.add('dragging');
      placeholder=document.createElement('div');
      placeholder.className='drag-placeholder';
      listEl.insertBefore(placeholder,r.nextSibling);
    });
    r.addEventListener('dragend',()=>{
      dragEl.classList.remove('dragging');
      placeholder&&placeholder.remove();
      dragEl=null;placeholder=null;
      // items 배열 순서 갱신
      const newIds=[...listEl.querySelectorAll('.item')].map(x=>x.dataset.id);
      items.sort((a,b)=>newIds.indexOf(a.id)-newIds.indexOf(b.id));
    });
  });
  listEl.addEventListener('dragover',e=>{
    e.preventDefault();
    const after=[...listEl.querySelectorAll('.item')].find(el=>{
      const box=el.getBoundingClientRect();
      return e.clientY<box.top+box.height/2;
    });
    if(placeholder){
      if(after) listEl.insertBefore(placeholder,after);
      else listEl.appendChild(placeholder);
    }
  });
}
</script>
</body>
</html>
