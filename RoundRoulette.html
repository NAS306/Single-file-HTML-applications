<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Round Roulette</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #fff;
      font-family: Arial, sans-serif;
      color: #000;
      overflow: hidden;
      height: calc(var(--vh, 1vh) * 100);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 2vh;
    }

    h1 {
      font-size: 8vw;
      margin: 1vh 0;
      cursor: text;
      outline: none;
    }

    #main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 3vw;
      width: 100%;
      max-width: 1200px;
      padding: 2vh;
      box-sizing: border-box;
    }

    .wheel-container {
      position: relative;
      width: fit-content;
      height: fit-content;
    }

    #pointer {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 25px solid rgb(255, 0, 0);
    }

    canvas#wheel {
      display: block;
      background: #eee;
      border-radius: 50%;
      width:50vh;
      max-width: 85vw;
    }

    #controls {
      display: flex;
      flex-direction: column;
      width: 50vw;
      max-width: 500px;
      gap: 1vh;
    }

    textarea {
      width: 100%;
      height: 20vh;
      font-size: 1.5rem;
      padding: 1vh;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
    }

    button {
      font-size: 2.5rem;
      padding: 1vh 1vw;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      background: #3498db;
      color: white;
      cursor: pointer;
    }

    p {
      font-size:1.5rem;
      margin:0;
    }

    #overlayResult {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 3vh 5vw;
      font-size: 3vw;
      font-weight: bold;
      border-radius: 12px;
      display: none;
      z-index: 1000;
      text-align: center;
      max-width: 90vw;
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

  </style>
</head>
<body>

  <h1 contenteditable="true">🎲 Enter your Title</h1>

  <div id="main">
    <div class="wheel-container">
      <div id="pointer"></div>
      <canvas id="wheel"></canvas>
    </div>

    <div id="controls">
      <button onclick="spin()">Spin</button>
      <button onclick="updateList()">Update List</button>
      <p>You can enter your list here per line</p>
      <textarea id="ideaList">
Option 1
Option 2
Option 3
Option 4
Option 5
Option 6
Option 7
Option 8
Option 9
Option 10
      </textarea>
    </div>
  </div>

  <div id="overlayResult"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

    const confettiCanvas = document.getElementById("confetti-canvas");
    const confettiInstance = confetti.create(confettiCanvas, { resize: true, useWorker: true });

    let ideas = [];
    let sliceColors = [];
    let angleOffset = 0;
    let spinning = false;

    function resizeCanvas() {
      const size = Math.min(window.innerWidth, window.innerHeight) * 0.5;
      canvas.width = size;
      canvas.height = size;
      drawWheel();
    }

    window.addEventListener("resize", resizeCanvas);

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '';
      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + ' ';
        const metrics = context.measureText(testLine);
        const testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
          context.fillText(line, x, y);
          line = words[n] + ' ';
          y += lineHeight;
        } else {
          line = testLine;
        }
      }
      context.fillText(line, x, y);
    }

    function getRandomLightColor() {
      const hue = Math.floor(Math.random() * 360);
      return `hsl(${hue}, 80%, 75%)`;
    }

    function drawWheel() {
      if (ideas.length === 0) return;
      const radius = canvas.width / 2;
      const sliceAngle = 2 * Math.PI / ideas.length;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(radius, radius);
      ctx.rotate(angleOffset);

      for (let i = 0; i < ideas.length; i++) {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, i * sliceAngle, (i + 1) * sliceAngle);
        ctx.fillStyle = sliceColors[i];
        ctx.fill();

        ctx.save();
        const angle = (i + 0.5) * sliceAngle;
        ctx.rotate(angle);
        ctx.translate(radius - 30, 0);
        ctx.rotate(Math.PI / 2);

        ctx.fillStyle = 'black';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        wrapText(ctx, ideas[i], 0, -7, 90, 14);

        ctx.restore();
      }

      ctx.restore();
    }

    function updateList() {
      const rawText = document.getElementById('ideaList').value.trim();
      ideas = rawText.split('\n').filter(line => line.trim() !== '');
      sliceColors = ideas.map(() => getRandomLightColor());
      drawWheel();
      overlay.style.display = "none";
    }

    function showOverlay(resultText) {
      overlay.textContent = `🎯 ${resultText}`;
      overlay.style.display = "block";

      confettiInstance({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
      });

      setTimeout(() => {
        overlay.style.display = "none";
      }, 3000);
    }

    function spin() {
      if (spinning || ideas.length === 0) return;
      spinning = true;
      audio.play();

      const spinTime = 4000;
      const spinAngle = Math.random() * Math.PI * 4 + Math.PI * 8;
      const start = performance.now();

      function animate(time) {
        const elapsed = time - start;
        const progress = Math.min(elapsed / spinTime, 1);
        const easeOut = 1 - Math.pow(1 - progress, 4);

        angleOffset = spinAngle * easeOut;
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          const sliceAngleDeg = 360 / ideas.length;
          const normalizedAngle = (angleOffset * 180 / Math.PI) % 360;
          const correctedAngle = (270 - normalizedAngle + 360) % 360;
          const index = Math.floor(correctedAngle / sliceAngleDeg);
          const selected = ideas[index];
          showOverlay(selected);
          spinning = false;
        }
      }

      requestAnimationFrame(animate);
    }

    resizeCanvas();
    updateList();
  </script>

</body>
</html>
