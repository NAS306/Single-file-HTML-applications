<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WebP 폴더 → PDF 변환기</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      text-align: center;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      margin-top: 1rem;
    }
    #progressWrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 1.5rem;
    }
    progress {
      width: 50%;
      height: 3rem;
    }
    #thumbnail {
      width: 200px;
      height: auto;
      margin-right: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #status {
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>📂 WebP 폴더 → PDF</h1>
  <p>Webp로 이뤄진 폴더를 선택하세요:</p>
  <input type="file" id="folderInput" webkitdirectory multiple />
  <br />
  <button id="convertBtn" disabled>📄 변환 대기 중</button>

  <div id="progressWrapper" style="display:none;">
    <img id="thumbnail" src="" alt="thumbnail" />
    <progress id="progressBar" value="0" max="100"></progress>
  </div>

  <div id="status"></div>

  <script>
    const folderInput = document.getElementById("folderInput");
    const convertBtn = document.getElementById("convertBtn");
    const progressBar = document.getElementById("progressBar");
    const progressWrapper = document.getElementById("progressWrapper");
    const thumbnail = document.getElementById("thumbnail");
    const status = document.getElementById("status");

    let files = [];
    let folderName = "output";

    folderInput.addEventListener("change", (e) => {
      files = Array.from(e.target.files).filter(file => file.name.endsWith(".webp"));
      if (files.length > 0) {
        const samplePath = files[0].webkitRelativePath || files[0].name;
        const parts = samplePath.split("/");
        folderName = parts.length >= 2 ? parts[parts.length - 2] : "output";
        files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

        convertBtn.disabled = false;
        convertBtn.textContent = `📄 PDF로 변환 (${files.length}장)`;

        // 썸네일 업데이트
        const reader = new FileReader();
        reader.onload = () => thumbnail.src = reader.result;
        reader.readAsDataURL(files[0]);
      } else {
        convertBtn.disabled = true;
        convertBtn.textContent = "📄 변환 대기 중";
        thumbnail.src = "";
      }
    });

    convertBtn.addEventListener("click", async () => {
      const { PDFDocument } = PDFLib;
      const pdfDoc = await PDFDocument.create();

      progressWrapper.style.display = "flex";
      progressBar.max = files.length;
      progressBar.value = 0;
      status.textContent = "변환 시작...";

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        try {
          const imgBitmap = await createImageBitmap(file);
          const canvas = document.createElement("canvas");
          canvas.width = imgBitmap.width;
          canvas.height = imgBitmap.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(imgBitmap, 0, 0);
          const pngBlob = await new Promise(res => canvas.toBlob(res, "image/png"));
          const pngBuffer = await pngBlob.arrayBuffer();

          const embedded = await pdfDoc.embedPng(pngBuffer);
          const dims = embedded.scale(1);
          const page = pdfDoc.addPage([dims.width, dims.height]);
          page.drawImage(embedded, { x: 0, y: 0, width: dims.width, height: dims.height });

          progressBar.value = i + 1;
          status.textContent = `📄 변환 중: ${i + 1} / ${files.length}`;
        } catch (e) {
          console.error(`❌ ${file.name} 변환 실패:`, e);
        }
      }

      try {
        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${folderName}.pdf`;
        link.click();

        status.textContent = `✅ 완료: ${folderName}.pdf 다운로드됨`;
      } catch (e) {
        status.textContent = `❌ PDF 저장 실패: ${e.message}`;
      }
    });
  </script>
</body>
</html>
