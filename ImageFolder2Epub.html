<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>이미지 폴더 → EPUB 변환기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      text-align: center;
    }
    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      margin-top: 1rem;
    }
    #progressWrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 1.5rem;
    }
    progress {
      width: 50%;
      height: 3rem;
    }
    #thumbnail {
      width: 200px;
      height: auto;
      margin-right: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #status {
      margin-top: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>📚 이미지 폴더 → EPUB</h1>
  <p>WebP, JPG, PNG 이미지가 담긴 폴더를 선택하세요:</p>
  <input type="file" id="folderInput" webkitdirectory multiple>
  <br>
  <button id="convertBtn" disabled>📖 EPUB로 변환</button>

  <div id="progressWrapper" style="display:none;">
    <img id="thumbnail" src="" alt="thumbnail" />
    <progress id="progressBar" value="0" max="100"></progress>
  </div>

  <div id="status"></div>

  <script>
    const folderInput = document.getElementById("folderInput");
    const convertBtn = document.getElementById("convertBtn");
    const progressBar = document.getElementById("progressBar");
    const progressWrapper = document.getElementById("progressWrapper");
    const thumbnail = document.getElementById("thumbnail");
    const status = document.getElementById("status");
    let files = [];
    let folderName = "output";
let coverId = "cover-image";


    folderInput.addEventListener("change", (e) => {
      files = Array.from(e.target.files).filter(f =>
        /\.(webp|jpe?g|png)$/i.test(f.name)
      );
      files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
      if (files.length > 0) {
        const samplePath = files[0].webkitRelativePath || files[0].name;
        const parts = samplePath.split("/");
        folderName = parts.length >= 2 ? parts[parts.length - 2] : "output";
        convertBtn.disabled = false;
        convertBtn.textContent = `📖 EPUB로 변환 (${files.length}장)`;

        const reader = new FileReader();
        reader.onload = () => thumbnail.src = reader.result;
        reader.readAsDataURL(files[0]);
      } else {
        convertBtn.disabled = true;
        convertBtn.textContent = "📖 EPUB로 변환";
        thumbnail.src = "";
      }
    });

    convertBtn.addEventListener("click", async () => {
      const zip = new JSZip();

      zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
      zip.folder("META-INF").file("container.xml", `<?xml version="1.0"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles>
    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
  </rootfiles>
</container>`);

      const oebps = zip.folder("OEBPS");
      const imageFolder = oebps.folder("images");
      const pageFolder = oebps.folder("pages");

      let manifestItems = "";
      let spineItems = "";

      progressWrapper.style.display = "flex";
      progressBar.max = files.length;
      progressBar.value = 0;
      status.textContent = "변환 시작...";

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const pageNum = String(i + 1).padStart(3, "0");
        const ext = file.name.split(".").pop().toLowerCase();

        let imgFileName;
        let mimeType;

        if (ext === "gif") {
          // GIF는 원본 그대로 포함
          const buffer = await file.arrayBuffer();
          imageFolder.file(`${pageNum}.gif`, buffer);
          imgFileName = `${pageNum}.gif`;
          mimeType = "image/gif";
        } else {
          // 나머지(WebP, JPG, PNG)는 JPEG로 변환
          const imgBitmap = await createImageBitmap(file);
          const canvas = document.createElement("canvas");
          canvas.width = imgBitmap.width;
          canvas.height = imgBitmap.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(imgBitmap, 0, 0);
          const jpegBlob = await new Promise(res => canvas.toBlob(res, "image/jpeg", 0.92));
          const jpegBuffer = await jpegBlob.arrayBuffer();
          imageFolder.file(`${pageNum}.jpg`, jpegBuffer);
          imgFileName = `${pageNum}.jpg`;
          mimeType = "image/jpeg";
        }

        // 페이지 생성
        const pageHtml = `<?xml version="1.0" encoding="UTF-8"?>
      <html xmlns="http://www.w3.org/1999/xhtml">
        <head><title>Page ${pageNum}</title></head>
        <body style="margin:0; padding:0;">
          <img src="../images/${imgFileName}" style="width:100%; display:block;"/>
        </body>
      </html>`;
        pageFolder.file(`page${pageNum}.xhtml`, pageHtml);

        manifestItems += `<item id="img${pageNum}" href="images/${imgFileName}" media-type="${mimeType}"/>\n`;
        manifestItems += `<item id="page${pageNum}" href="pages/page${pageNum}.xhtml" media-type="application/xhtml+xml"/>\n`;
        spineItems += `<itemref idref="page${pageNum}"/>\n`;

        progressBar.value = i + 1;
        status.textContent = `📖 변환 중: ${i + 1} / ${files.length}`;
      }

      const opf = `<?xml version="1.0" encoding="UTF-8"?>
        <package xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid" version="2.0">
          <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
            <dc:title>${folderName}</dc:title>
            <dc:language>ko</dc:language>
            <dc:identifier id="bookid">urn:uuid:${crypto.randomUUID()}</dc:identifier>
            <meta name="cover" content="${coverId}"/>
          </metadata>
          <manifest>
            ${manifestItems}
          </manifest>
          <spine toc="ncx">
            ${spineItems}
          </spine>
        </package>`;
              oebps.file("content.opf", opf);

              const ncx = `<?xml version="1.0" encoding="UTF-8"?>
        <ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
          <head><meta name="dtb:uid" content="${crypto.randomUUID()}"/></head>
          <docTitle><text>${folderName}</text></docTitle>
          <navMap>
            ${spineItems.trim().split("\n").map((_, idx) => `
            <navPoint id="navPoint-${idx + 1}" playOrder="${idx + 1}">
              <navLabel><text>Page ${idx + 1}</text></navLabel>
              <content src="pages/page${String(idx + 1).padStart(3, "0")}.xhtml"/>
            </navPoint>`).join("")}
          </navMap>
        </ncx>`;
      oebps.file("toc.ncx", ncx);

      const blob = await zip.generateAsync({ type: "blob", mimeType: "application/epub+zip" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${folderName}.epub`;
      link.click();

      status.textContent = `✅ 완료: ${folderName}.epub 다운로드됨`;
    });
  </script>
</body>
</html>
