    align-items: center;

.container {
    width: 90%;

header {
    font-size: 22px;
    margin-bottom: 10px;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;

.stats {
    font-size: 24px;

#speed {

.text-display {
    font-size: 26px;
    line-height: 1.7;

    white-space: pre-wrap;
}

.char.correct { color: #4caf50; }
.char.incorrect { color: #f44336; background: rgba(255,0,0,0.2); }
.char.current { background: #444; }

textarea {
    width: 100%;
    height: 100px;
    background: #000;
    color: #fff;
    border: 1px solid #333;
    font-size: 20px;
    padding: 10px;
    outline: none;
}

.controls button {
    background: #222;
    color: #ddd;
    border: 1px solid #444;
    padding: 8px 12px;
    margin-right: 5px;
    cursor: pointer;
}
</style>
</head>

// ---------------- 상태 ----------------
let setIndex = 0;
let sentences = sentenceSets[setIndex];

let totalTypedChars = 0;
let lastLength = 0;

let currentIndex = 0;
let startTime = null;
let correctChars = 0;

const inputEl = document.getElementById("input");
const currentEl = document.getElementById("current-text");
const nextEl = document.getElementById("next-text");
const speedEl = document.getElementById("speed");
const controlsEl = document.querySelector(".controls");

// ---------------- 버튼 ----------------
function createButtons() {
    controlsEl.innerHTML = "";

    sentenceSets.forEach((_, i) => {
        const btn = document.createElement("button");
        btn.textContent = `SET ${i + 1}`;
        btn.onclick = () => {
            setIndex = i;
            sentences = sentenceSets[i];
            restart();
        };
        controlsEl.appendChild(btn);
    });
}

// ---------------- 렌더 ----------------
function render() {
    const target = sentences[currentIndex];
    const typed = inputEl.value;

    let html = "";

    for (let i = 0; i < target.length; i++) {
        let cls = "";

        if (i < typed.length) {
            cls = typed[i] === target[i] ? "correct" : "incorrect";
        }

        if (i === typed.length) cls += " current";

        html += `<span class="char ${cls}">${target[i] === " " ? "&nbsp;" : target[i]}</span>`;
    }

    currentEl.innerHTML = html;

    nextEl.textContent =
        sentences[currentIndex + 1] || "(END)";
}

// ---------------- WPM ----------------
function updateWPM() {
    if (!startTime) return;

    const minutes = (Date.now() - startTime) / 60000;

    const wpm = minutes > 0
        ? Math.round((totalTypedChars / 5) / minutes)
        : 0;

    speedEl.textContent = wpm;
}

// ---------------- 입력 ----------------
inputEl.addEventListener("input", () => {
    if (!startTime) startTime = Date.now();

    const typed = inputEl.value;

    // 입력 증가량만 반영
    if (typed.length > lastLength) {
        totalTypedChars += (typed.length - lastLength);
    }

    lastLength = typed.length;

    render();
    updateWPM();
});

// ---------------- Enter ----------------
inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        e.preventDefault();

        currentIndex++;

        if (currentIndex >= sentences.length) {
            alert("DONE");
            restart();
        } else {
            inputEl.value = "";
            render();
        }
    }
});

// ---------------- 초기화 ----------------
function restart() {
    currentIndex = 0;
    startTime = null;
    correctChars = 0;
    inputEl.value = "";
    speedEl.textContent = "0";

    render();
}

function init() {
    createButtons();
    restart();
}

init();
