<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>영어 타자 연습</title>
<style>
    body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #6a7886;
        margin: 0;
        padding: 20px;
        color: #111;
    }
    .container {
        max-width: 960px;
        margin: 0 auto;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        overflow: hidden;
    }
    header {
        background: #2563eb;
        color: white;
        padding: 16px;
        text-align: center;
        font-size: 1.5rem;
        font-weight: bold;
        position: relative;
    }
    .stats {
        display: flex;
        justify-content: center;
        gap: 80px;
        padding: 16px;
        background: #f1f5f9;
    }
    .stat {
        text-align: center;
    }
    .label { color: #64748b; font-size: 0.95rem; }
    .value { font-size: 2.4rem; font-weight: bold; }

    .typing-area {
        padding: 32px 40px;
        min-height: 100px;
        position: relative;
    }
    .text-display {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 1.45rem;
        line-height: 1.7;
        letter-spacing: 0.5px;
        white-space: pre;
        margin-bottom: 24px;
    }
    #current-text { 
        border-bottom: 2px solid #e2e8f0; 
        padding-bottom: 12px; 
        min-height: 60px;
    }
    #next-text { 
        opacity: 0.5; 
        font-size: 1.25rem; 
        color: #64748b;
    }

    .input-area {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 1.3rem;
        line-height: 1.7;
        letter-spacing: 0.5px;
        width: 100%;
        padding: 12px;
        border: 2px solid #cbd5e1;
        border-radius: 8px;
        resize: none;
        outline: none;
        background: #f8fafc;
        box-sizing: border-box;
        transition: all 0.2s;
        height: 65px;
    }
    .input-area:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .input-area.complete {
        border-color: #10b981;
        background: #ecfdf5;
    }

    .char { position: relative; }
    .char.correct   { color: #2563eb; font-weight: 500; }
    .char.incorrect { color: #ef4444; background: #fee2e2; }
    .char.current   { background: #fef08a; color: #713f12; }

    .controls {
        padding: 16px 40px;
        background: #f8fafc;
        border-top: 1px solid #e2e8f0;
        text-align: center;
    }
    button {
        margin-top: 8px;
        padding: 10px 24px;
        font-size: 1.1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        background: #2563eb;
        color: white;
    }

    #complete-message {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.7);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 2.2rem;
        display: none;
        z-index: 10;
        text-align: center;
        padding: 20px;
    }
    #restart-button {
        background: #10b981;
    }
</style>
</head>
<body>

<div class="container">
    <header>
        영어 타자 연습
        <div id="remaining-sentences" style="position: absolute; top: 16px; right: 16px; font-size: 1.1rem; color: white;">남은 줄: 36</div>
    </header>

    <div class="stats">
        <div class="stat">
            <div class="label">현재 속도 (최근 6타 평균)</div>
            <div class="value" id="speed">---</div>

        </div>
    </div>

    <div class="typing-area">
        <div class="text-display" id="current-text"></div>
        <div class="text-display" id="next-text"></div>

        <textarea id="input" class="input-area" autofocus spellcheck="false" autocorrect="off" autocapitalize="off"
            placeholder="영어(US)만 입력 가능합니다."></textarea>

        <div id="complete-message">
            <div>연습 완료!</div>
            <div style="font-size:1.5rem; margin:24px 0;">

            </div>
            <button id="restart-button" onclick="restart()">다시 시작</button>

    </div>

    <div class="controls">

// 현재 사용할 문장 목록 (초기값으로 sentences1 사용)
let sentences = sentences1;

// 문장 세트 변경 함수
function setSentences(n) {
    if (n === 1) sentences = sentences1;
    else if (n === 2) sentences = sentences2;
    else if (n === 3) sentences = sentences3;
    else if (n === 4) sentences = sentences4;
    else if (n === 5) sentences = sentences5;
    else if (n === 6) sentences = sentences6;
    else if (n === 7) sentences = sentences7;
    else if (n === 8) sentences = sentences8;
    else return; // 미정

    // 글자 수 다시 계산
    totalTargetChars = sentences.reduce((sum, s) => sum + s.length, 0);
    restart();
}


let currentIndex = 0;
let totalTargetChars = 0;
let totalTypingTime = 0; // 각 줄의 타이핑 시간 합 (ms)
let lineStartTime = null; // 현재 줄의 타이핑 시작 시간
let timer = null;
let charTimestamps = [];

const currentTextEl = document.getElementById("current-text");
const nextTextEl    = document.getElementById("next-text");
const inputEl       = document.getElementById("input");
const speedEl       = document.getElementById("speed");
const completeMsg   = document.getElementById("complete-message");
const finalSpeedAllEl = document.getElementById("final-speed-all");
const finalWpmEl = document.getElementById("final-wpm");

// 남은 문장 수 표시 함수
function updateRemaining() {
    const remaining = sentences.length - currentIndex;
    document.getElementById("remaining-sentences").textContent = `남은 줄: ${remaining}`;
}

// 미리 총 글자 수 계산 (공백 포함)
totalTargetChars = sentences.reduce((sum, s) => sum + s.length, 0);

// --------------------------------------------------
// 비영어 문자 필터링 (한글 등 무시)
// --------------------------------------------------
function filterNonEnglish(value) {
    // ASCII printable 문자(공백~DEL)만 허용 → 한글/일본어/중국어 등 대부분 제거
    return value.replace(/[^\x20-\x7E]/g, '');
}

// --------------------------------------------------
// 표시 업데이트
// --------------------------------------------------
function updateDisplay() {
    const target = sentences[currentIndex];
    const typed  = inputEl.value;

    let html = "";
    for (let i = 0; i < target.length; i++) {
        const t = target[i];
        const u = typed[i] ?? "";

        let cls = "";
        if (i < typed.length) {
            cls = (u === t) ? "correct" : "incorrect";
        }
        if (i === typed.length) {
            cls += " current";
        }

        html += `<span class="char ${cls}">${t === " " ? "&nbsp;" : t}</span>`;
    }

    currentTextEl.innerHTML = html;

    if (typed.length >= target.length) {
        inputEl.classList.add("complete");
    } else {
        inputEl.classList.remove("complete");
    }

    if (currentIndex + 1 < sentences.length) {
        nextTextEl.textContent = sentences[currentIndex + 1];
    } else {
        nextTextEl.textContent = "(마지막 문장입니다)";
    }
}

// --------------------------------------------------
// 최근 6타 평균 속도
// --------------------------------------------------
function updateRecentSpeed() {
    if (charTimestamps.length < 2) {
        speedEl.textContent = "---";
        return;
    }

    const recent = charTimestamps.slice(-6);
    if (recent.length < 2) return;

    const timeDiffSec = (recent[recent.length-1] - recent[0]) / 1000;
    if (timeDiffSec <= 0) return;

    const charsCount = recent.length;
    const speed = Math.round((charsCount / timeDiffSec) * 60);
    speedEl.textContent = speed;
}

// --------------------------------------------------
// 완료
// --------------------------------------------------
function finish() {
    clearInterval(timer);
    inputEl.disabled = true;

    const overallSpeed = totalTypingTime > 0 ? Math.round(totalTargetChars / (totalTypingTime / 1000 / 60)) : 0;
    const overallWpm = Math.round(overallSpeed / 5);

    finalSpeedAllEl.textContent = overallSpeed;
    finalWpmEl.textContent = overallWpm;

    completeMsg.style.display = "flex";
}

function restart() {
    currentIndex = 0;
    totalTypingTime = 0;
    lineStartTime = null;
    charTimestamps = [];
    inputEl.value = "";
    inputEl.disabled = false;
    inputEl.classList.remove("complete");
    inputEl.focus();
    completeMsg.style.display = "none";
    speedEl.textContent = "---";

    // 문장 목록이 바뀌었을 수 있으므로 총 글자 수 다시 계산
    totalTargetChars = sentences.reduce((sum, s) => sum + s.length, 0);

    loadCurrentLine();
    clearInterval(timer);
    timer = null;
    updateRemaining();
}

function loadCurrentLine() {
    inputEl.value = "";
    lineStartTime = null; // 줄 시작 시 타이핑 시간 초기화
    updateDisplay();
}

// --------------------------------------------------
// 입력 처리
// --------------------------------------------------
inputEl.addEventListener("input", (e) => {
    const now = Date.now();

    // 한글 등 비영어 문자 제거
    const filtered = filterNonEnglish(e.target.value);
    if (filtered !== e.target.value) {
        const cursorPos = e.target.selectionStart;
        e.target.value = filtered;
        e.target.setSelectionRange(cursorPos, cursorPos);
    }

    const target = sentences[currentIndex];
    const typed = inputEl.value;

    if (!lineStartTime && typed.length > 0) {
        lineStartTime = now;
        timer = setInterval(updateRecentSpeed, 400);
    }

    charTimestamps.push(now);
    if (charTimestamps.length > 6) charTimestamps.shift();

    updateDisplay();
});

inputEl.addEventListener("keydown", e => {
    // Shift + Enter → 바로 완료 (디버그용)
    if (e.key === "Enter" && e.shiftKey) {
        e.preventDefault();
        // 현재 줄의 타이핑 시간 추가
        if (lineStartTime) {
            totalTypingTime += (Date.now() - lineStartTime);
        }
        finish();
        return;
    }

    // 일반 Enter → 다음 문장
    if (e.key === "Enter") {
        e.preventDefault();

        // 현재 줄의 타이핑 시간 추가
        if (lineStartTime) {
            totalTypingTime += (Date.now() - lineStartTime);
        }

        currentIndex++;
        if (currentIndex >= sentences.length) {
            finish();
        } else {
            loadCurrentLine();
            charTimestamps = [];
        }
        updateRemaining();
    }
});

// --------------------------------------------------
// 초기화
// --------------------------------------------------
function init() {
    loadCurrentLine();
    inputEl.focus();
    updateRemaining();
}

window.addEventListener("load", init);
</script>
